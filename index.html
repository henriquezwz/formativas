  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);line-height:1.5;padding:18px;min-height:100vh;

  .banner{background:linear-gradient(135deg,#7b2ff7,#2575fc);color:#fff;border-radius:18px;padding:16px;margin-bottom:20px;text-align:center;box-shadow:0 6px 18px rgba(80,40,160,.3);}
  .banner strong{display:block;font-size:.98rem;letter-spacing:.02em;} .banner span{font-size:.78rem;opacity:.92;}
  .eyebrow{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brand);font-weight:800;margin-bottom:6px;}
  h1{font-size:1.55rem;margin:0 0 4px;line-height:1.15;background:linear-gradient(90deg,#7b2ff7,#2575fc);-webkit-background-clip:text;background-clip:text;color:transparent;}
  h2{font-size:1.2rem;margin:0 0 2px;}
  .sub{color:var(--ink-soft);font-size:.94rem;margin:0 0 18px;}
  label{display:block;font-weight:700;font-size:.88rem;margin:14px 0 6px;}
  input,textarea,select{width:100%;padding:13px 14px;font-size:1rem;border:1.5px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);font-family:inherit;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft);}
  .btn{appearance:none;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:1rem;padding:15px 18px;border-radius:14px;color:#fff;width:100%;transition:filter .15s,transform .05s;background:linear-gradient(135deg,#7b2ff7,#2575fc);box-shadow:0 6px 16px rgba(80,40,160,.28);}
  .btn:hover{filter:brightness(1.07);} .btn:active{transform:translateY(1px);} .btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
  .btn.ghost{background:#fff;color:var(--brand);border:2px solid var(--brand);box-shadow:none;}
  .btn.amber{background:linear-gradient(135deg,#f59e0b,#f97316);} .btn.soft{background:var(--brand-soft);color:var(--brand);box-shadow:none;}
  .btn.danger{background:#fff;color:var(--no);border:2px solid var(--no);box-shadow:none;}
  .btn.sm{width:auto;padding:9px 14px;font-size:.85rem;border-radius:11px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;} .row .btn{width:auto;flex:1;}
  .mt{margin-top:14px;} .mt-s{margin-top:8px;}
  .hint{font-size:.82rem;color:var(--ink-soft);margin-top:12px;}
  .back{background:none;border:none;color:var(--brand);font-weight:800;cursor:pointer;font-size:.9rem;padding:0;margin-bottom:14px;font-family:inherit;}
  .ctile{display:flex;justify-content:space-between;align-items:center;gap:12px;border-radius:18px;padding:18px;margin-bottom:12px;cursor:pointer;color:#fff;transition:transform .1s,box-shadow .15s;box-shadow:0 8px 18px rgba(40,20,90,.18);}

  .ctile .ct-title{font-weight:800;font-size:1.12rem;} .ctile .ct-arrow{font-size:1.3rem;opacity:.9;}
  .atile{display:flex;align-items:center;gap:14px;border:1.5px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:11px;background:#fff;cursor:pointer;transition:.12s;}
  .atile:hover{border-color:var(--brand);background:var(--brand-soft);}
  .atile .ico{flex:none;width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;}

  .mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0;}
  .mcard{aspect-ratio:3/4;border-radius:14px;border:none;background:linear-gradient(135deg,#7b2ff7,#2575fc);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:6px;font-size:.82rem;font-weight:700;cursor:pointer;box-shadow:0 4px 10px rgba(40,20,90,.18);}

  .scroll{max-height:74vh;}

</style>

/* ---------- DB ---------- */
function clean(d,id){ return Object.assign({id},d); }
async function dbTurmas(){ const s=await db.collection("turmas").get(); return s.docs.map(d=>clean(d.data(),d.id)).sort((a,b)=>(a.nome||"").localeCompare(b.nome||"")); }
async function dbTurma(id){ const d=await db.collection("turmas").doc(id).get(); if(!d.exists)throw new Error("Turma não encontrada"); return clean(d.data(),d.id); }
async function dbCriarTurma(nome){ await db.collection("turmas").add({nome,alunos:[],created_at:new Date().toISOString()}); }
async function dbRenomearTurma(id,nome){ await db.collection("turmas").doc(id).update({nome}); }
async function dbSalvarAlunos(id,alunos){ await db.collection("turmas").doc(id).update({alunos}); }
async function dbSalvarAdaptados(id,adaptados){ await db.collection("turmas").doc(id).update({adaptados}); }
async function dbSalvarLiberacoes(id,liberacoes){ await db.collection("turmas").doc(id).update({liberacoes}); }
async function dbApagarTurmaFull(id){
  const a=await db.collection("atividades").where("turma_id","==",id).get(); for(const doc of a.docs) await doc.ref.delete();
  const r=await db.collection("respostas").where("turma_id","==",id).get(); for(const doc of r.docs) await doc.ref.delete();
  await db.collection("turmas").doc(id).delete();
}
async function dbAtividades(turmaId,soAtivas){ const s=await db.collection("atividades").where("turma_id","==",turmaId).get();
  let a=s.docs.map(d=>clean(d.data(),d.id)); if(soAtivas)a=a.filter(x=>x.ativo); return a; }
async function dbCriarAtividade(o){ await db.collection("atividades").add(Object.assign({created_at:new Date().toISOString()},o)); }
async function dbApagarAtividade(id){ await db.collection("atividades").doc(id).delete(); }
async function dbToggle(id,ativo){ await db.collection("atividades").doc(id).update({ativo}); }
async function dbSalvarResposta(o){ await db.collection("respostas").add(Object.assign({uid:auth.currentUser.uid,created_at:new Date().toISOString()},o)); }
async function dbRespostasTurma(turmaId){ const s=await db.collection("respostas").where("turma_id","==",turmaId).get(); return s.docs.map(d=>clean(d.data(),d.id)); }
async function dbMinhasRespostas(turmaId){ const s=await db.collection("respostas").where("uid","==",auth.currentUser.uid).get(); return s.docs.map(d=>clean(d.data(),d.id)).filter(r=>r.turma_id===turmaId); }

async function alunoAtividades(turma,nome){
  setWide("760px"); app.innerHTML=`<div class="card">${SCHOOL}<button class="back" onclick="home()">‹ Sair</button>
    <div class="eyebrow">${esc(turma.nome)} · ${esc(nome.split(" ")[0])}</div>
    <h2>Suas atividades</h2><div id="lista"><p class="empty">Carregando…</p></div></div>`;
  try{
    const [ats0,minhas]=await Promise.all([dbAtividades(turma.id,true),dbMinhasRespostas(turma.id)]);
    const adaptado=(turma.adaptados||[]).map(deburr).includes(deburr(nome));
    const visivel=a=>{const p=a.publico||"todos"; return p==="todos"||(p==="adaptados"&&adaptado)||(p==="regulares"&&!adaptado);};
    const ats=ats0.filter(visivel).sort(byCreated).reverse(); const box=document.getElementById("lista");
    if(!ats.length){box.innerHTML='<p class="empty">Nenhuma atividade ativa no momento. 🎈</p>';return;}
    const best={},last={}; minhas.forEach(r=>{ if(best[r.atividade_id]==null||r.nota>best[r.atividade_id])best[r.atividade_id]=r.nota;
      const t=r.created_at||""; if(!last[r.atividade_id]||t>last[r.atividade_id])last[r.atividade_id]=t; });
    const lib=turma.liberacoes||{};
    box.innerHTML="";
    ats.forEach(a=>{
      const jogo=a.tipo==="memoria"; const done=best[a.id]!=null;
      const rel=lib[deburr(nome)+"||"+a.id]; const released=!!rel&&(!last[a.id]||rel>last[a.id]); const locked=done&&!released;
      const meta=a.vale_nota?`Vale ${fmt(a.valor)} pontos`:(jogo?"Jogo · sem nota":"Treino · sem nota");
      let right;
      if(locked) right=`<span class="tag done">${a.vale_nota?"Nota "+fmt(best[a.id]):"Feito"} 🔒</span>`;
      else if(released) right=`<span class="tag go">Refazer ↻</span>`;
      else right=`<span class="tag go">Fazer ›</span>`;
      const d=document.createElement("div");d.className="atile";
      if(locked){d.style.cursor="default";d.style.opacity=".7";}
      d.innerHTML=`<span class="ico" style="background:${jogo?'linear-gradient(135deg,#ec4899,#f97316)':'linear-gradient(135deg,#7b2ff7,#2575fc)'}">${jogo?"🎮":"📝"}</span>
        <div class="a-main"><div class="a-title">${esc(a.titulo)}</div><div class="a-meta">${meta}${locked?" · já entregue":""}</div></div>${right}`;
      if(!locked) d.onclick=()=>runner(a,turma,nome);
      box.appendChild(d);});
  }catch(e){erro(e);}
}

/* ---------- QUIZ (alternativas embaralhadas por aluno) ---------- */
function quizRun(a,turma,nome,partner){
  const qs=(a.conteudo&&a.conteudo.questoes)||[]; let cur=0; const ans=new Array(qs.length).fill(null);
  const base=qs.map(q=>{ let opts,corr;
    if(q.tipo==="vf"){opts=["Verdadeiro","Falso"];corr=q.correta?0:1;} else {opts=q.alternativas.slice();corr=q.correta;}
    return {opts,corr,order:shuffle(opts.map((_,i)=>i))}; });
  function render(){
    const q=qs[cur], b=base[cur];
    const opts=b.order.map((origIdx,disp)=>`<div class="opt ${ans[cur]===disp?"sel":""}" data-i="${disp}"><span class="key">${KEYS[disp]}</span><span>${esc(b.opts[origIdx])}</span></div>`).join("");
    app.innerHTML=`<div class="card">${SCHOOL}
      <div class="topbar"><span>Questão <b>${cur+1}</b> de <b>${qs.length}</b></span><span>${esc(a.titulo)}</span></div>
      <div class="progress"><i style="width:${cur/qs.length*100}%"></i></div>
      <div class="eyebrow">Questão ${String(cur+1).padStart(2,"0")}</div>
      <div class="qtext">${esc(q.enunciado)}</div>${q.frase?`<div class="qphrase">${esc(q.frase)}</div>`:""}
      <div id="opts">${opts}</div><div id="w" class="warn hidden">Selecione uma alternativa.</div>
      <div class="row mt">${cur>0?'<button class="btn ghost" id="prev">Voltar</button>':""}
        <button class="btn" id="next">${cur===qs.length-1?"Finalizar ✓":"Próxima →"}</button></div></div>`;
    document.querySelectorAll(".opt").forEach(el=>el.onclick=()=>{ans[cur]=+el.dataset.i;render();});
    const pv=document.getElementById("prev"); if(pv)pv.onclick=()=>{cur--;render();};
    document.getElementById("next").onclick=()=>{if(ans[cur]==null){document.getElementById("w").classList.remove("hidden");return;} if(cur<qs.length-1){cur++;render();}else finish();};
  }
  async function finish(){
    let hits=0; qs.forEach((q,i)=>{const b=base[i]; if(ans[i]!=null&&b.order[ans[i]]===b.corr)hits++;});
    const nota=a.vale_nota?Math.round(a.valor*hits/qs.length*10)/10:0;
    try{ await dbSalvarResposta({atividade_id:a.id,turma_id:turma.id,aluno_nome:nome,nota,acertos:hits,total:qs.length,detalhes:partner?{dupla_com:partner}:{}});
      if(partner) await dbSalvarResposta({atividade_id:a.id,turma_id:turma.id,aluno_nome:partner,nota,acertos:hits,total:qs.length,detalhes:{dupla_com:nome}}); }catch(e){}
    quizResult(a,turma,nome,qs,base,ans,hits,nota,partner);
  }
  render();
}
function quizResult(a,turma,nome,qs,base,ans,hits,nota,partner){
  const aprov=a.vale_nota?(nota>=a.valor*0.6):true;
  const review=qs.map((q,i)=>{const b=base[i]; const ok=ans[i]!=null&&b.order[ans[i]]===b.corr;
    const sua=ans[i]==null?"—":b.opts[b.order[ans[i]]]; const corr=b.opts[b.corr];
    return `<div class="rev ${ok?"correct":"wrong"}"><span class="rtag">${ok?"✓ Questão "+(i+1)+" — Correta":"✗ Questão "+(i+1)+" — Incorreta"}</span>
      <p>${esc(q.enunciado)}${q.frase?'<br><em>'+esc(q.frase)+'</em>':''}</p>
      <p style="font-size:.86rem"><b>Sua resposta:</b> ${esc(sua)}</p>
      ${ok?"":'<p style="font-size:.86rem"><b>Correta:</b> '+esc(corr)+"</p>"}
      ${q.explicacao?'<div class="exp">'+esc(q.explicacao)+'</div>':''}</div>`;}).join("");
  const ag=new Date();
  app.innerHTML=`<div class="card">${SCHOOL}<div class="center">
      ${a.vale_nota?`<div class="score-big">${fmt(nota)}<span class="score-of"> / ${fmt(a.valor)}</span></div>`:`<div class="score-big">${hits}<span class="score-of"> / ${qs.length}</span></div>`}
      <div class="pill" style="background:${aprov?'var(--ok-soft)':'var(--no-soft)'};color:${aprov?'var(--ok)':'var(--no)'}">${a.vale_nota?(aprov?"Muito bem! 🎉":"Revise o conteúdo"):"Concluído! 🎉"}</div></div>
    <p class="sub center mt"><b>${esc(nome)}</b> · ${esc(turma.nome)}<br>Acertos: <b>${hits}</b> de ${qs.length}<br>
      <span style="font-size:.8rem">Concluído em ${ag.toLocaleDateString("pt-BR")} às ${ag.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</span></p>
    <div class="info">✅ Nota salva automaticamente${partner?" para você e para "+esc(partner):""}.</div>
    <h2 class="mt">Revisão comentada</h2>${review}
    <button class="btn amber mt" id="v">Voltar às atividades</button></div>`;
  document.getElementById("v").onclick=()=>alunoAtividades(turma,nome);
}

/* ---------- JOGO DA MEMÓRIA ---------- */
function memoriaRun(a,turma,nome,partner){
  const pares=(a.conteudo&&a.conteudo.pares)||[];
  let cards=[]; pares.forEach((p,i)=>{cards.push({pid:i,txt:p.a});cards.push({pid:i,txt:p.b});}); shuffle(cards);
  let flipped=[],matched=0,moves=0,lock=false,start=Date.now();
  function render(){
    app.innerHTML=`<div class="card">${SCHOOL}
      <div class="topbar"><span>Pares: <b>${matched}</b>/${pares.length}</span><span>Jogadas: <b>${moves}</b></span></div>
      <div class="eyebrow">🎮 ${esc(a.titulo)}</div><p class="sub">Encontre os pares que combinam.</p>
      <div class="mem-grid" id="grid"></div><button class="btn ghost mt" id="sair">Sair</button></div>`;
    const g=document.getElementById("grid");
    cards.forEach((c,idx)=>{const up=flipped.includes(idx)||c.done;const el=document.createElement("div");
      el.className="mcard"+(c.done?" matched":up?" up":""); el.textContent=up?c.txt:"?"; if(!c.done&&!up)el.onclick=()=>flip(idx); g.appendChild(el);});
    document.getElementById("sair").onclick=()=>alunoAtividades(turma,nome);
  }
  function flip(idx){ if(lock||flipped.includes(idx))return; flipped.push(idx); render();
    if(flipped.length===2){ moves++; lock=true; const [x,y]=flipped;
      if(cards[x].pid===cards[y].pid){cards[x].done=cards[y].done=true;matched++;flipped=[];lock=false;render(); if(matched===pares.length)setTimeout(finish,400);}
      else setTimeout(()=>{flipped=[];lock=false;render();},700);}}
  async function finish(){
    const seg=Math.round((Date.now()-start)/1000);
    const nt=a.vale_nota?a.valor:0; const det={jogadas:moves,segundos:seg};
    try{ await dbSalvarResposta({atividade_id:a.id,turma_id:turma.id,aluno_nome:nome,nota:nt,acertos:pares.length,total:pares.length,detalhes:partner?Object.assign({dupla_com:partner},det):det});
      if(partner) await dbSalvarResposta({atividade_id:a.id,turma_id:turma.id,aluno_nome:partner,nota:nt,acertos:pares.length,total:pares.length,detalhes:Object.assign({dupla_com:nome},det)}); }catch(e){}
    app.innerHTML=`<div class="card">${SCHOOL}<div class="center"><div class="score-big">🎉</div>
      <div class="pill" style="background:var(--ok-soft);color:var(--ok)">Você completou o jogo!</div></div>
      <p class="sub center mt"><b>${esc(nome)}</b> · ${esc(turma.nome)}<br>Jogadas: <b>${moves}</b> · Tempo: <b>${seg}s</b></p>
      <div class="info">✅ Desempenho salvo${partner?" para você e para "+esc(partner):""}.</div>
      <button class="btn amber mt" id="v">Voltar às atividades</button></div>`;
    document.getElementById("v").onclick=()=>alunoAtividades(turma,nome);
  }
  render();
}

    <textarea id="ros" style="min-height:260px;font-family:inherit;font-size:.95rem">${esc(roster.join("\n"))}</textarea>
    <button class="btn mt-s" id="sv">Salvar lista de alunos</button>
    <p class="hint">${roster.length} aluno(s) cadastrado(s).</p>
    <h2 class="mt">Avaliação adaptada (PEI)</h2>
    <p class="sub">Marque quem fará a versão adaptada. Esse aluno será redirecionado automaticamente para a atividade marcada como “Só adaptados”.</p>
    ${roster.length?roster.map(n=>`<label class="check" style="margin:7px 0"><input type="checkbox" class="adp" value="${esc(n)}" ${(turma.adaptados||[]).map(deburr).includes(deburr(n))?"checked":""}> ${esc(n)}</label>`).join(""):'<p class="hint">Salve a lista de alunos primeiro.</p>'}
    ${roster.length?'<button class="btn amber mt-s" id="svadp">Salvar adaptados</button>':''}`;
  document.getElementById("sv").onclick=async()=>{
    const arr=document.getElementById("ros").value.split("\n").map(x=>norm(x)).filter(Boolean);
    try{ await dbSalvarAlunos(turma.id,arr); turma.alunos=arr; profTurma(turma,"alunos"); }catch(e){erro(e);}
  };
  const svadp=document.getElementById("svadp");
  if(svadp) svadp.onclick=async()=>{ const arr=[...document.querySelectorAll(".adp:checked")].map(e=>e.value);
    try{ await dbSalvarAdaptados(turma.id,arr); turma.adaptados=arr; profTurma(turma,"alunos"); }catch(e){erro(e);} };
}

async function abaAtividades(turma){
  const c=document.getElementById("conteudo"); const link=location.origin+location.pathname+"#t="+turma.id;
  try{
    const ats=(await dbAtividades(turma.id,false)).sort(byCreated).reverse();
    let html=`<div class="info">🔗 Link desta turma para os alunos:<div class="linkbox">${esc(link)}</div>
      <button class="btn soft sm mt-s" style="width:auto" id="cp">Copiar link</button></div>`;
    if(!ats.length)html+='<p class="empty">Nenhuma atividade ainda. Adicione abaixo.</p>';
    else{html+='<div class="mt">';ats.forEach(a=>{
      html+=`<div class="row-item"><div class="ri-main"><div class="ri-title">${a.tipo==="memoria"?"🎮":"📝"} ${esc(a.titulo)}</div>
        <div class="ri-meta">${a.vale_nota?"Vale "+fmt(a.valor)+" pts":"Sem nota"}${a.dupla?" · 👥 dupla":""}${a.publico==="adaptados"?" · ♿ adaptados":(a.publico==="regulares"?" · regulares":"")}</div></div>
        <div class="row" style="flex:none;width:auto">
          <button class="btn sm ${a.ativo?'soft':'ghost'}" data-act="toggle" data-id="${a.id}" data-on="${a.ativo}">${a.ativo?"Ativa":"Inativa"}</button>
          <button class="btn sm danger" data-act="del" data-id="${a.id}">Excluir</button></div></div>`;});
      html+='</div>';}
    html+=`<h2 class="mt">Adicionar atividade</h2>
      <p class="sub">Escolha o arquivo (.json) que recebeu. O título vem do próprio arquivo.</p>
      <label class="filebtn" for="file">📁 Escolher arquivo da atividade</label>
      <input type="file" id="file" accept=".json,application/json" class="hidden">
      <div id="preview" class="hidden info"></div>
      <label class="mt">Pontuação</label>
      <div class="row" style="align-items:center"><input type="number" id="f-val" step="0.5" min="0" value="5" style="flex:1">
        <label class="check"><input type="checkbox" id="f-sem"> Sem pontuação</label></div>
      <label class="mt">Quem vê esta atividade?</label>
      <select id="f-pub"><option value="todos">Todos os alunos</option><option value="regulares">Só alunos regulares</option><option value="adaptados">Só alunos adaptados (PEI)</option></select>
      <label class="check mt"><input type="checkbox" id="f-dup"> Permitir fazer em dupla (a nota vai para os dois)</label>
      <div id="iw" class="warn hidden"></div>
      <button class="btn mt-s" id="imp" disabled>Adicionar atividade</button>`;
    c.innerHTML=html;
    document.getElementById("cp").onclick=()=>{navigator.clipboard?.writeText(link);document.getElementById("cp").textContent="Copiado!";};
    c.querySelectorAll("[data-act]").forEach(b=>b.onclick=async()=>{try{
      if(b.dataset.act==="del"){if(confirm("Excluir esta atividade?")){await dbApagarAtividade(b.dataset.id);abaAtividades(turma);}}
      else{await dbToggle(b.dataset.id,b.dataset.on!=="true");abaAtividades(turma);}
    }catch(e){erro(e);}});
    let loaded=null,loadedName="";
    const prev=document.getElementById("preview"), imp=document.getElementById("imp"), iw=document.getElementById("iw");
    const fval=document.getElementById("f-val"), fsem=document.getElementById("f-sem");
    fsem.addEventListener("change",()=>{ fval.disabled=fsem.checked; });
    document.getElementById("file").addEventListener("change",e=>{
      const f=e.target.files[0]; if(!f)return; loadedName=f.name.replace(/\.json$/i,"");
      const r=new FileReader();
      r.onload=()=>{ iw.classList.add("hidden");
        try{ loaded=JSON.parse(r.result); }catch(err){ loaded=null;prev.classList.add("hidden");imp.disabled=true; iw.textContent="Arquivo inválido. Use o arquivo .json da atividade.";iw.classList.remove("hidden");return; }
        if(!loaded.tipo||!loaded.conteudo){ loaded=null;imp.disabled=true; iw.textContent="O arquivo não parece ser uma atividade válida.";iw.classList.remove("hidden");return; }
        const tit=loaded.titulo||loadedName;
        const n=(loaded.conteudo.questoes&&loaded.conteudo.questoes.length)||(loaded.conteudo.pares&&loaded.conteudo.pares.length)||0;
        prev.innerHTML=`✅ <b>${esc(tit)}</b><br>${loaded.tipo==="memoria"?"jogo da memória ("+n+" pares)":"quiz ("+n+" questões)"}`; prev.classList.remove("hidden");
        if(loaded.valor!=null)fval.value=loaded.valor;
        if(loaded.vale_nota===false){fsem.checked=true;fval.disabled=true;}
        imp.disabled=false;
      };
      r.readAsText(f);
    });
    imp.onclick=async()=>{ iw.classList.add("hidden");
      if(!loaded){iw.textContent="Escolha primeiro o arquivo da atividade.";iw.classList.remove("hidden");return;}
      const sem=fsem.checked; const valor=sem?0:parseFloat(fval.value);
      if(!sem&&isNaN(valor)){iw.textContent="Informe a pontuação ou marque \"Sem pontuação\".";iw.classList.remove("hidden");return;}
      const titulo=norm(loaded.titulo||loadedName)||"Atividade";
      const publico=document.getElementById("f-pub").value; const dupla=document.getElementById("f-dup").checked;
      try{ await dbCriarAtividade({turma_id:turma.id,titulo,tipo:loaded.tipo,valor,vale_nota:!sem,publico,dupla,conteudo:loaded.conteudo,ativo:true}); abaAtividades(turma); }catch(e){ erro(e); }
    };
  }catch(e){erro(e);}
}

async function abaNotas(turma){
  const c=document.getElementById("conteudo");
  try{
    const [ats0,resp]=await Promise.all([dbAtividades(turma.id,false),dbRespostasTurma(turma.id)]);
    const cols=ats0.sort(byCreated); const roster=turma.alunos||[];
    const best={},last={}; resp.forEach(r=>{const k=deburr(r.aluno_nome)+"||"+r.atividade_id;
      if(best[k]==null||r.nota>best[k])best[k]=r.nota; const t=r.created_at||""; if(!last[k]||t>last[k])last[k]=t;});
    const lib=turma.liberacoes||{};
    if(!cols.length){ c.innerHTML='<p class="empty">Nenhuma atividade criada ainda.</p>'; return; }
    if(!roster.length){ c.innerHTML='<div class="info">Cadastre a lista de alunos na aba <b>👥 Alunos</b> para ver quem fez (verde) e quem não fez (vermelho).</div>'; return; }
    const head=`<th>Nº</th><th style="text-align:left">Aluno</th>`+cols.map(a=>`<th>${esc(a.titulo)}</th>`).join("");
    const body=roster.map((nome,i)=>{ const nl=deburr(nome);
      const cells=cols.map(a=>{ const k=nl+"||"+a.id; const v=best[k];
        if(v==null) return `<td class="r">não fez</td>`;
        const rel=lib[k]; const pend=!!rel&&(!last[k]||rel>last[k]);
        return `<td class="g" data-k="${esc(k)}" data-nome="${esc(nome)}" data-act="${a.id}" title="Clique para liberar refazer" style="cursor:pointer">${a.vale_nota?fmt(v):"✓"}${pend?" 🔓":""}</td>`; }).join("");
      return `<tr><td>${i+1}</td><td style="text-align:left">${esc(nome)}</td>${cells}</tr>`; }).join("");
    const rosterSet=new Set(roster.map(n=>deburr(n)));
    const extras=[...new Set(resp.map(r=>norm(r.aluno_nome)).filter(n=>!rosterSet.has(deburr(n))))];
    const extraHtml=extras.length?`<div class="warn">⚠️ ${extras.length} envio(s) com nome fora da lista: ${extras.map(esc).join(", ")}.</div>`:"";
    c.innerHTML=`<p class="sub"><span style="color:var(--ok);font-weight:800">Verde</span> = fez (clique numa nota para liberar refazer) · <span style="color:var(--no);font-weight:800">vermelho</span> = não fez · 🔓 = liberado p/ refazer.</p>
      <button class="btn amber" id="csv" style="width:auto">⬇ Baixar planilha (CSV)</button>${extraHtml}
      <div class="scroll mt"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
    c.querySelectorAll("td.g[data-k]").forEach(td=>td.onclick=async()=>{
      const at=(cols.find(x=>x.id===td.dataset.act)||{}).titulo||"esta atividade";
      if(confirm("Liberar \""+td.dataset.nome+"\" para REFAZER \""+at+"\"?")){
        const l=Object.assign({},turma.liberacoes||{}); l[td.dataset.k]=new Date().toISOString();
        try{ await dbSalvarLiberacoes(turma.id,l); turma.liberacoes=l; abaNotas(turma); }catch(e){erro(e);}
      }
    });
    document.getElementById("csv").onclick=()=>{
      let csv="Nº,Aluno,"+cols.map(a=>'"'+a.titulo.replace(/"/g,"")+'"').join(",")+"\n";
      roster.forEach((nome,i)=>{ const nl=deburr(nome);
        csv+=(i+1)+',"'+nome+'",'+cols.map(a=>{const v=best[nl+"||"+a.id]; return v==null?'"não fez"':'"'+(a.vale_nota?fmt(v):"OK")+'"';}).join(",")+"\n"; });
      const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
      const aa=document.createElement("a");aa.href=URL.createObjectURL(blob);aa.download="notas-"+turma.nome.replace(/\s+/g,"_")+".csv";aa.click();
    };
  }catch(e){erro(e);}
}
async function carregarAlunosAuto(){
  if(!isTeacher())return profLogin();
  if(!confirm("Isto vai preencher a lista de alunos das turmas reconhecidas (6A, 6B, 7, 8A, 8B, 9), substituindo listas existentes nessas turmas. Continuar?"))return;
  try{
    const t=await dbTurmas(); let n=0; const det=[];
    for(const tu of t){ const key=(tu.nome||"").replace(/\s+/g,"").toUpperCase();
      if(ROSTERS[key]){ await dbSalvarAlunos(tu.id,ROSTERS[key]); n++; det.push(tu.nome+" \u2192 "+ROSTERS[key].length+" alunos"); } }
    alert(n? ("Pronto! Alunos carregados em "+n+" turma(s):\n\n"+det.join("\n")) : "Nenhuma turma com nome reconhecido. Os nomes devem ser 6A, 6B, 7, 8A, 8B ou 9.");
    profTurmas();
  }catch(e){erro(e);}
}
function erro(e){ app.innerHTML=`<div class="card">${SCHOOL}<div class="warn">Erro de conexão ou permissão.<br><br>${esc(e.message||e)}</div>
  <button class="btn mt" onclick="boot()">Voltar ao início</button></div>`; }
boot();
</script>
